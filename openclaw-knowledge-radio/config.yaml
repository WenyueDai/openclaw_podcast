timezone: "Europe/London"
lookback_hours: 24

paths:
  data_dir: "data"
  output_dir: "output"
  state_dir: "state"

limits:
  max_items_total: 40
  max_items_protein: 38
  max_items_daily_knowledge: 5
  source_caps:
    "Nature Communications": 4
    "Nature (main journal)": 3
    "Science Advances": 3
    "PNAS": 3
    "Nature Microbiology": 5
    "Microbiome": 4
    "mSystems": 3
    "Journal of Bacteriology": 2
  max_items_per_news_source: 1

excluded_terms:
  # Off-topic physical sciences
  - "superconductiv"
  - "quantum network"
  - "quantum optic"
  - "interferometry"
  - "quantum computing"
  # Administrative / non-research
  - "author correction"
  - "in this issue"
  - "retraction notice"
  # Off-topic biology (protein design tools, not gut microbiota)
  - "protein design"
  - "antibody design"
  - "AlphaFold"
  - "RFdiffusion"
  - "ProteinMPNN"

rss_sources:
  # ── Core gut microbiota journals ──────────────────────────────────────────────
  - name: "Nature Microbiology"
    url: "https://www.nature.com/nmicrobiol.rss"
    tags: ["microbiology", "microbiota", "journal"]
    bucket: "protein"

  - name: "Nature Reviews Microbiology"
    url: "https://www.nature.com/nrmicro.rss"
    tags: ["microbiology", "review", "journal"]
    bucket: "protein"

  - name: "Cell Host and Microbe"
    url: "https://www.cell.com/cell-host-microbe/inpress.rss"
    tags: ["microbiota", "host-microbe", "journal"]
    bucket: "protein"

  - name: "Microbiome"
    url: "https://microbiomejournal.biomedcentral.com/articles/most-recent.rss"
    tags: ["microbiome", "gut", "journal"]
    bucket: "protein"

  - name: "ISME Journal"
    url: "https://www.nature.com/ismej.rss"
    tags: ["microbial-ecology", "microbiome", "journal"]
    bucket: "protein"

  - name: "Gut Microbes"
    url: "https://www.tandfonline.com/action/showFeed?type=etoc&feed=rss&jc=kgmi20"
    tags: ["gut-microbiota", "journal"]
    bucket: "protein"

  - name: "npj Biofilms and Microbiomes"
    url: "https://www.nature.com/npjbiofilms.rss"
    tags: ["microbiome", "biofilm", "journal"]
    bucket: "protein"

  - name: "mSystems"
    url: "https://journals.asm.org/action/showFeed?type=etoc&feed=rss&jc=msystems"
    tags: ["microbiology", "systems-biology", "journal"]
    bucket: "protein"

  - name: "Journal of Bacteriology"
    url: "https://journals.asm.org/action/showFeed?type=etoc&feed=rss&jc=jb"
    tags: ["microbiology", "bacteria", "journal"]
    bucket: "protein"

  # ── Top general journals ───────────────────────────────────────────────────────
  - name: "Nature (main journal)"
    url: "https://www.nature.com/nature.rss"
    tags: ["nature", "journal"]
    bucket: "journal"

  - name: "Cell"
    url: "https://www.cell.com/cell/inpress.rss"
    tags: ["cell", "journal"]
    bucket: "journal"

  - name: "Science"
    url: "https://www.science.org/action/showFeed?type=etoc&feed=rss&jc=science"
    tags: ["science", "journal"]
    bucket: "journal"

  - name: "PNAS"
    url: "https://www.pnas.org/rss/current.xml"
    tags: ["biology", "journal"]
    bucket: "journal"

  - name: "Nature Communications"
    url: "https://www.nature.com/ncomms.rss"
    tags: ["nature", "communications", "journal"]
    bucket: "journal"

  - name: "Nature Cancer"
    url: "https://www.nature.com/natcancer.rss"
    tags: ["cancer", "microbiome", "journal"]
    bucket: "journal"

  - name: "Cell Systems"
    url: "https://www.cell.com/cell-systems/inpress.rss"
    tags: ["systems-biology", "journal"]
    bucket: "journal"

  - name: "Science Advances"
    url: "https://www.science.org/action/showFeed?type=etoc&feed=rss&jc=sciadv"
    tags: ["science", "multidisciplinary", "journal"]
    bucket: "journal"

  - name: "Molecular Systems Biology"
    url: "https://www.embopress.org/action/showFeed?type=etoc&feed=rss&jc=msb"
    tags: ["systems-biology", "journal"]
    bucket: "journal"

  # ── Methods ────────────────────────────────────────────────────────────────────
  - name: "Nature Methods"
    url: "https://www.nature.com/nmeth.rss"
    tags: ["methods", "journal"]
    bucket: "protein"

  - name: "Nature Protocols"
    url: "https://www.nature.com/nprot.rss"
    tags: ["protocols", "methods", "journal"]
    bucket: "protein"

  - name: "Cell STAR Protocols"
    url: "https://www.cell.com/star-protocols/inpress.rss"
    tags: ["protocols", "methods", "journal"]
    bucket: "protein"

  # ── Bioinformatics & Computational ────────────────────────────────────────────
  - name: "PLOS Computational Biology"
    url: "https://journals.plos.org/ploscompbiol/feed/atom"
    tags: ["computational-biology", "journal"]
    bucket: "ai_bio"

  - name: "Bioinformatics (OUP)"
    url: "https://academic.oup.com/rss/site_5504/3823.xml"
    tags: ["bioinformatics", "computational", "journal"]
    bucket: "ai_bio"

  # ── arXiv ─────────────────────────────────────────────────────────────────────
  - name: "arXiv q-bio.GN (Genomics)"
    url: "https://arxiv.org/rss/q-bio.GN"
    tags: ["genomics", "metagenomics", "preprint", "arxiv"]
    bucket: "ai_bio"

  - name: "arXiv q-bio.PE (Populations & Evolution)"
    url: "https://arxiv.org/rss/q-bio.PE"
    tags: ["microbial-ecology", "evolution", "preprint", "arxiv"]
    bucket: "ai_bio"

  - name: "arXiv cs.LG (AI/ML)"
    url: "https://arxiv.org/rss/cs.LG"
    tags: ["machine-learning", "arxiv"]
    bucket: "ai_bio"

  # ── News & outreach ───────────────────────────────────────────────────────────
  - name: "Gut Microbiota for Health"
    url: "https://www.gutmicrobiotaforhealth.com/feed/"
    tags: ["microbiome", "outreach", "news"]
    bucket: "daily"

  - name: "ISAPP Science"
    url: "https://isappscience.org/feed/"
    tags: ["probiotics", "prebiotics", "science-communication"]
    bucket: "daily"

pubmed:
  enabled: true
  email: "daiwenyueva@gmail.com"
  lookback_days: 2
  max_results_per_term: 30
  bucket: "protein"
  tags: ["pubmed", "journal", "biology"]
  search_terms:
    # Core gut microbiota
    - "gut microbiota"
    - "gut microbiome"
    - "intestinal microbiota"
    - "intestinal microbiome"
    # Metabolism & metabolites
    - "gut microbiome metabolism"
    - "short-chain fatty acids gut microbiota"
    - "butyrate gut microbiota"
    - "microbiome metabolomics"
    - "gut microbiome bile acids"
    - "microbial metabolites host"
    # Host-microbiome interactions
    - "host-microbiome interaction"
    - "gut microbiota immunity"
    - "microbiota intestinal barrier"
    - "gut epithelial barrier microbiome"
    - "gut-brain axis microbiome"
    - "microbiota inflammation"
    - "microbiome immune system"
    # Disease
    - "gut microbiome inflammatory bowel disease"
    - "microbiome colorectal cancer"
    - "gut microbiota obesity"
    - "gut microbiota type 2 diabetes"
    - "microbiome liver disease"
    # Interventions
    - "fecal microbiota transplantation"
    - "probiotics clinical trial"
    - "prebiotics gut microbiota"
    - "dietary fiber gut microbiota"
    # Methods
    - "shotgun metagenomics gut"
    - "16S rRNA gut microbiome"
    - "metatranscriptomics gut microbiome"
    - "multi-omics gut microbiome"
    - "metagenome-assembled genomes gut"
    # Specific organisms
    - "Akkermansia muciniphila"
    - "Faecalibacterium prausnitzii"
    # Computational
    - "machine learning microbiome"

biorxiv_keywords:
  enabled: true
  lookback_days: 2
  bucket: "protein"
  tags: ["biorxiv", "preprint", "biology"]

daily_knowledge:
  enabled: false

wiki_context:
  enabled: false

podcast:
  enabled: true
  target_minutes: 60
  voice: "en-GB-RyanNeural"
  voice_rate: "+0%"
  tts_chunk_chars: 2800
  chunking:
    fulltext_threshold_chars: 2500
    tierA_max: 999
    tierB_max: 999
    tierB_batch_size: 1
    deep_dive_max_tokens: 1800
    roundup_max_tokens: 1200
    use_merge_llm: false

biorxiv_authors:
  enabled: false
  lookback_days: 3
  authors: []
  # Add key researchers in your field here. Example:
  # - name: "Researcher Name"
  #   match: "Surname, F"
  #   institution: "University"   # optional, helps disambiguate common names

publish:
  enabled: true
  github_release_repo: "WenyueDai/protein_design_podcast"
  cleanup_intermediate: true

llm:
  enabled: true
  provider: "openrouter"
  model: "arcee-ai/trinity-large-preview:free"
  analysis_model: "stepfun/step-3.5-flash:free"
  api_key_env: "OPENROUTER_API_KEY"
  temperature: 0.25
  max_output_tokens: 8192

ranking:
  # Papers whose titles contain any of these are treated as absolute priority
  # (same tier as tracked author feeds). Use for landmark databases / methods.
  absolute_title_keywords:
    - "gut microbiota"
    - "gut microbiome"
    - "intestinal microbiota"
    - "intestinal microbiome"
    - "Akkermansia"
    - "Faecalibacterium"
    - "fecal microbiota transplant"
    - "dysbiosis"

  absolute_source_substrings: []
  # Add tracked researchers here once defined. Example:
  # - "researcher surname"

  source_priority_rules:
    - {contains: "nature microbiology", priority: 1}
    - {contains: "nature reviews microbiology", priority: 1}
    - {contains: "cell host and microbe", priority: 1}
    - {contains: "cell host & microbe", priority: 1}
    - {contains: "microbiome", priority: 1}
    - {contains: "isme journal", priority: 1}
    - {contains: "gut microbes", priority: 2}
    - {contains: "npj biofilms", priority: 2}
    - {contains: "cell systems", priority: 2}
    - {contains: "msystems", priority: 2}
    - {contains: "pnas", priority: 2}
    - {contains: "nature communications", priority: 3}
    - {contains: "science advances", priority: 3}
    - {contains: "molecular systems biology", priority: 3}
    - {contains: "journal of bacteriology", priority: 3}
    - {contains: "plos computational biology", priority: 4}
    - {contains: "bioinformatics", priority: 4}
    - {contains: "arxiv", priority: 5}

  # Items whose title or snippet contain any of these keywords are ranked
  # above other items of equal source quality.
  topic_boost_keywords:
    # Core microbiota
    - "gut microbiota"
    - "gut microbiome"
    - "intestinal microbiota"
    - "intestinal microbiome"
    - "microbial community"
    - "microbiome composition"
    - "alpha diversity"
    - "beta diversity"
    - "dysbiosis"
    # Metabolism & metabolites
    - "short-chain fatty acids"
    - "SCFA"
    - "butyrate"
    - "propionate"
    - "acetate"
    - "bile acids"
    - "microbial metabolites"
    - "microbiome metabolomics"
    - "tryptophan metabolism"
    - "indole"
    # Host interactions
    - "host-microbiome"
    - "intestinal barrier"
    - "gut permeability"
    - "epithelial barrier"
    - "tight junction"
    - "mucus layer"
    - "mucosal immunity"
    - "gut immunity"
    - "gut-brain axis"
    - "gut inflammation"
    - "microbial translocation"
    - "microbiota colonization"
    # Specific organisms
    - "Akkermansia"
    - "Faecalibacterium"
    - "Bacteroides"
    - "Bifidobacterium"
    - "Lactobacillus"
    - "Prevotella"
    - "Ruminococcus"
    - "Clostridium"
    - "Lachnospiraceae"
    # Interventions
    - "fecal microbiota transplant"
    - "fecal transplant"
    - "probiotics"
    - "prebiotics"
    - "synbiotics"
    - "dietary fiber"
    - "dietary intervention"
    # Methods
    - "metagenomics"
    - "16S rRNA"
    - "metatranscriptomics"
    - "metaproteomics"
    - "metagenome-assembled"
    - "multi-omics"
    - "microbiome analysis"
    # Disease associations
    - "inflammatory bowel disease"
    - "Crohn's disease"
    - "ulcerative colitis"
    - "colorectal cancer"
    - "obesity microbiome"
    - "diabetes microbiome"
    - "metabolic syndrome"
